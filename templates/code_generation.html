{% extends 'base.html' %}

{% block title %}Code Generation{% endblock %}

{% block content %}
<section class="page-header">
    <div class="page-icon">💻</div>
    <h1 class="page-title"><span class="gradient-text">Code Generation</span></h1>
    <p class="page-subtitle">Generate production-ready code with detailed explanations</p>
</section>

<section class="generator-section">
    <div class="generator-card">
        <form id="code-form" class="generator-form">
            <div class="form-group">
                <label for="topic">What code would you like to generate?</label>
                <input type="text" id="topic" name="topic"
                    placeholder="e.g., binary search algorithm, neural network from scratch..." required>
            </div>
            <div class="form-group">
                <label for="complexity">Code Complexity</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="complexity" value="basic">
                        <span class="radio-label">Basic</span>
                        <span class="radio-desc">Beginner-friendly</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="complexity" value="intermediate" checked>
                        <span class="radio-label">Intermediate</span>
                        <span class="radio-desc">Well-structured</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="complexity" value="advanced">
                        <span class="radio-label">Advanced</span>
                        <span class="radio-desc">Production-quality</span>
                    </label>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                <span class="btn-text">Generate Code</span>
                <span class="btn-loader"></span>
            </button>
        </form>
    </div>

    <div id="result-container" class="result-container hidden">
        <div class="result-header">
            <h2>Generated Code</h2>
            <div class="result-meta">
                <span id="api-info" class="api-badge"></span>
                <button id="copy-btn" class="code-action-btn" title="Copy code">📋</button>
                <button id="download-btn" class="code-action-btn" title="Download as .py">⬇️</button>
            </div>
        </div>
        <div id="result-content" class="result-content markdown-body"></div>
    </div>
</section>

<style>
    .code-action-btn {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text-secondary);
        font-size: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.25s var(--ease-out);
    }

    .code-action-btn:hover {
        background: rgba(244, 114, 182, 0.12);
        border-color: rgba(244, 114, 182, 0.3);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(244, 114, 182, 0.15);
    }
</style>
{% endblock %}

{% block scripts %}
<script>
    let generatedCode = '';

    document.getElementById('code-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        const resultContainer = document.getElementById('result-container');
        const resultContent = document.getElementById('result-content');

        btn.classList.add('loading');
        resultContainer.classList.add('hidden');

        const topic = document.getElementById('topic').value;
        const complexity = document.querySelector('input[name="complexity"]:checked').value;

        try {
            const response = await fetch('/api/generate-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ topic, complexity })
            });
            const data = await response.json();

            if (data.success) {
                generatedCode = data.content;
                resultContent.innerHTML = marked.parse(data.content);

                // Display API info badge
                const apiInfo = document.getElementById('api-info');
                apiInfo.innerHTML = `⚡ ${data.api_used} (${data.model}) • ${data.response_time}s`;
                apiInfo.className = 'api-badge ' + (data.api_used.includes('Gemini') ? 'gemini' : 'perplexity');

                resultContainer.classList.remove('hidden');
                hljs.highlightAll();
            } else {
                showError(data.error || 'Failed to generate code');
            }
        } catch (err) {
            showError('Network error. Please try again.');
        } finally {
            btn.classList.remove('loading');
        }
    });

    document.getElementById('copy-btn').addEventListener('click', () => {
        navigator.clipboard.writeText(generatedCode);
        showToast('Code copied to clipboard!');
    });

    document.getElementById('download-btn').addEventListener('click', () => {
        const codeMatch = generatedCode.match(/```python\n([\s\S]*?)```/);
        const code = codeMatch ? codeMatch[1] : generatedCode;
        const blob = new Blob([code], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'generated_code.py';
        a.click();
        URL.revokeObjectURL(url);
        showToast('Code downloaded!');
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
{% endblock %}
